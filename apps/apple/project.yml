---
name: CodeEverywhereApple
options:
    bundleIdPrefix: com.codeeverywhere
    deploymentTarget:
        iOS: "17.0"
packages:
    CodeEverywhereApple:
        path: .
targets:
    CodeEverywhere:
        type: application
        platform: iOS
        deploymentTarget: "17.0"
        sources:
            - path: App
        dependencies:
            - package: CodeEverywhereApple
              product: CodeEverywhereAppleUI
        settings:
            base:
                CODE_SIGNING_ALLOWED: "NO"
                CODE_SIGN_STYLE: Manual
                DEVELOPMENT_TEAM: ""
                PRODUCT_BUNDLE_IDENTIFIER: com.codeeverywhere.app
                SWIFT_VERSION: "6.0"
                TARGETED_DEVICE_FAMILY: "1,2"
        info:
            path: App/Info.plist
            properties:
                CFBundleDisplayName: Code Everywhere
                CFBundleShortVersionString: "0.1"
                CFBundleVersion: "1"
                CFBundleURLTypes:
                    - CFBundleURLName: Code Everywhere
                      CFBundleURLSchemes:
                          - code-everywhere
                LSRequiresIPhoneOS: true
                UIApplicationSceneManifest:
                    UIApplicationSupportsMultipleScenes: true
                UIApplicationSupportsIndirectInputEvents: true
                UILaunchScreen: {}
